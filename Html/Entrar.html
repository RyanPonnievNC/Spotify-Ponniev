<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar na conta</title>

<link rel="stylesheet" href="/CSS/Entrar.css">
<link rel="stylesheet" href="/css/Geral.css">

</head>
<body>
    
<div id="corpo">

<form action="/Html/Em processo.html">
<!--
type: o tipo;
name: a palavra chave/ o identificador;
value: é o valor noqual o site vai identificar
placeholder: o nome que estará dentro do(s) local(is) de texto;
<label for="...">[...]: transforma tal texto clicável; 
<selecte>: selecionar uma caixa com opicões
<options>: as opicões do "<select>"
-->

     <!--Utilizado para logar em uma conta-->

<div id="entrar-na-conta-do-usuário"><h1>Entrar na conta do usuário</h1></div>



    <div id="dados-pessoas"><legend>Dados pessoas:</legend></div>
    
<div id="email"><label for="email">Email:<br></label></div>
<input type="email" name="email" placeholder="Digite seu email" id="digite-seu-email">
<br>

<div id="senha"><label for="senha">Senha:<br></label></div>
<input type="password" name="senha" placeholder="Digite sua senha" id="digite-sua-senha">
<br>

<div id="logar">

<button name="logar" type="submit">Logar</button>
</form>
</div>

<!--Sempre ao criar um botão, colocar o "type=submit"-->
<div id="criar">
<h3>Você ainda não tem uma conta no nosso site? Crie uma clicando <a href="/Html/Nova conta.html">aqui</a></h3>
</div>
<div id="voltando"><h1><a href="/Index.html">Voltar</a></h1></div>

    </div>
</body>
</html>
